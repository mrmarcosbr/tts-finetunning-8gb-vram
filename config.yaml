# CONFIGURAÇÕES GERAIS
# ==============================================================================
settings:
  default_dataset_profile: "lapsbm_fastspeech2"
  local_datasets_dir: "./datasets"

# ==============================================================================
# PERFIS DE HARDWARE (Processamento e Otimização de Memória)
# ==============================================================================
hardware_profiles:
  cpu:
    device: "cpu"
    batch_size: 1
    fp16: false
    gradient_accumulation_steps: 8
    output_dir: "./output_cpu"

  cuda_8gb:
    device: "cuda"
    batch_size: 4
    fp16: true # Crucial para economizar VRAM
    gradient_accumulation_steps: 4 # Total batch virtual = 16
    output_dir: "./output_cuda_8gb"

  cuda_16gb:
    device: "cuda"
    batch_size: 20
    fp16: true
    gradient_accumulation_steps: 1
    output_dir: "./output_cuda_16gb"

  macbook:
    device: "mps" # Metal Performance Shaders para Apple Silicon
    batch_size: 2
    fp16: false # MPS ainda tem instabilidades com fp16 em alguns ops de TTS
    gradient_accumulation_steps: 4
    output_dir: "./output_mac"

# ==============================================================================
# CONFIGURAÇÕES DE MODELOS BASE
# ==============================================================================
models:
  speecht5:
    id: "microsoft/speecht5_tts"
    sampling_rate: 16000
    vocoder_id: "microsoft/speecht5_hifigan"
    speaker_encoder_id: "speechbrain/spkrec-xvect-voxceleb"
    lora:
      r: 256
      alpha: 512
      dropout: 0.0
      target_modules: [ "q_proj", "k_proj", "v_proj", "out_proj" ]

  fastspeech2:
    id: "tts_models/en/ljspeech/fast_pitch"
    sampling_rate: 22050
    lora:
      r: 256
      alpha: 512
      dropout: 0.0
      # Focando nas camadas de atenção, feed-forward, Pitch Predictor e Duration Predictor
      target_modules:
        [
          "conv1",
          "conv2",
          "conv_1",
          "conv_2",
          "proj",
          "pitch_emb",
          "self_attn",
          "out_proj",
        ]

  matcha:
    id: "shivammehta25/Matcha-TTS"
    sampling_rate: 22050
    lora:
      r: 32
      alpha: 64
      dropout: 0.1
      target_modules: [ "to_q", "to_k", "to_v", "to_out" ]

  glow_tts:
    id: "tts_models/en/ljspeech/glow-tts"
    sampling_rate: 22050
    lora:
      r: 32
      alpha: 64
      dropout: 0.1
      target_modules: [ "linear_q", "linear_k", "linear_v", "linear_out" ]

# ==============================================================================
# PERFIS DE DATASET (Configurações específicas por Treinamento)
# A cada novo dataset solicitado, criaremos um novo profile aqui.
# ==============================================================================
dataset_profiles:
  # Perfil padrão para o dataset LapsBM (FalaBrasil)
  lapsbm_speecht5:
    dataset_id: "falabrasil/lapsbm"
    dataset_split: "test"
    model_type: "speecht5"
    num_speakers: 0 # 0 para todos
    num_samples_per_speaker: 10000 # Limite balizador
    zero_shot_split:
      train_speakers: 28
      val_speakers: 3
      test_speakers: 4
    training:
      learning_rate: 0.00001
      num_epochs: 2500
      weight_decay: 0.0
      save_steps: 500
      logging_steps: 50

  lapsbm_fastspeech2:
    dataset_id: "falabrasil/lapsbm"
    dataset_split: "test"
    model_type: "fastspeech2"
    num_speakers: 0
    num_samples_per_speaker: 2000
    zero_shot_split:
      train_speakers: 28
      val_speakers: 3
      test_speakers: 4
    training:
      learning_rate: 0.0002 # FS2 aceita LR um pouco mais alta que o SpeechT5
      batch_size: 48
      gradient_accumulation_steps: 1
      dataloader_num_workers: 4
      num_epochs: 400
      save_steps: 1000
      logging_steps: 50

  lapsbm_matcha:
    dataset_id: "falabrasil/lapsbm"
    dataset_split: "test"
    model_type: "matcha"
    num_speakers: 0
    training:
      learning_rate: 0.0001
      num_epochs: 1000
      save_steps: 500
      logging_steps: 50

  lapsbm_glow_tts:
    dataset_id: "falabrasil/lapsbm"
    dataset_split: "test"
    model_type: "glow_tts"
    num_speakers: 0
    training:
      learning_rate: 0.00005
      num_epochs: 2500
      save_steps: 500
      logging_steps: 50

  # Perfil para dataset derivado do Common Voice - pt-br_char
  pt_br_char_speecht5:
    dataset_id: "firstpixel/pt-br_char"
    dataset_split: "train"
    model_type: "speecht5"
    num_speakers: 1 # 0 para todos
    num_samples_per_speaker: 100 # Limite de captação de amostras por voz
    training:
      learning_rate: 0.00002
      num_epochs: 1000
      weight_decay: 0.01
      save_steps: 500
      logging_steps: 100

  # Perfil para o BRSpeech-DF (Deepfake Detection/Voice Samples) - NÃO USAR pois não tem Transcrições
  # Nota: Este dataset foca em detecção, vozes reais no subset 'bonafide'
  brspeech_df_speecht5:
    dataset_id: "AKCIT-Deepfake/BRSpeech-DF"
    dataset_split: "train"
    dataset_config: "bonafide" # Subset com vozes reais para clonagem/finetuning
    model_type: "speecht5"
    num_speakers: 1
    training:
      learning_rate: 0.00001
      num_epochs: 5000
      weight_decay: 0.01
      save_steps: 1000
      logging_steps: 100
